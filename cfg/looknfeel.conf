general {
    # No gaps between windows or borders
    gaps_in = 4
    gaps_out = 6
    border_size = 2

    # Change to niri-like side-scrolling layout
    layout = scrolling


}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 4

  shadow {
      enabled = false
    }

  blur {
    enabled = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
  enabled = true

  bezier = smoothOut, 0.25, 0.46, 0.45, 0.94
  bezier = smoothIn, 0.55, 0.06, 0.68, 0.19
  bezier = overshot, 0.05, 0.9, 0.1, 1.05

  animation = windows, 1, 3, smoothOut, popin 80%
  animation = windowsOut, 1, 3, smoothIn, popin 80%
  animation = border, 1, 7, default
  animation = fade, 1, 3, smoothOut
  animation = workspaces, 1, 4, smoothOut, slide
  animation = specialWorkspace, 1, 4, smoothOut, slidevert
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {

}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
}

plugin {
    scrolloverview {
        gesture_distance = 300
        scale = 0.57
        workspace_gap = 10
        layout = vertical
        wallpaper = 0
        blur = false

        shadow {
            enabled = false
          }
      }
  }

scrolling {
    fullscreen_on_one_column = true
    column_width = 1
}


